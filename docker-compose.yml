services:
  db:
    image: postgres:16-alpine
    container_name: kenalyuk-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kenalyuk}
      POSTGRES_USER: ${POSTGRES_USER:-kenalyuk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kenalyuk_dev_password}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kenalyuk} -d ${POSTGRES_DB:-kenalyuk}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kenalyuk-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://kenalyuk:kenalyuk_dev_password@db:5432/kenalyuk?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-env-docker}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOAD_DIRECTORY: ${UPLOAD_DIRECTORY:-/app/public/uploads}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-smtp-user}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-smtp-password}
      SMTP_PASS: ${SMTP_PASS:-smtp-password}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
