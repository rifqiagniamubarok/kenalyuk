services:
  db:
    image: postgres:16-alpine
    container_name: kenalyuk-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kenalyuk}
      POSTGRES_USER: ${POSTGRES_USER:-kenalyuk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kenalyuk_dev_password}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kenalyuk} -d ${POSTGRES_DB:-kenalyuk}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kenalyuk-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      # Override or add runtime-only variables here
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  postgres_data:
  uploads_data:
